name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: hebbs-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: hebbs-linux-aarch64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: hebbs-macos-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p hebbs-vault -p hebbs-bench
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/hebbs dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/hebbs-bench dist/ 2>/dev/null || true
          # Backward-compat symlinks (removed in v0.3.0)
          cd dist && ln -s hebbs hebbs-cli && ln -s hebbs hebbs-vault && cd ..
          tar czf ${{ matrix.artifact }}.tar.gz -C dist .
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  build-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-smoke-test:
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    needs: [build-docker]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          docker pull "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}"
          echo "IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}" >> "$GITHUB_ENV"

      - name: Start container
        run: |
          docker run -d \
            --name hebbs-smoke \
            -p 6380:6380 \
            -p 6381:6381 \
            -e HEBBS_AUTH_ENABLED=false \
            "${IMAGE}"

      - name: Wait for health check
        run: |
          echo "Waiting for HEBBS to become ready..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:6381/v1/health/ready > /dev/null 2>&1; then
              echo "HEBBS is ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Timed out waiting for HEBBS readiness"
          docker logs hebbs-smoke
          exit 1

      - name: Verify metrics endpoint
        run: |
          curl -sf http://localhost:6381/v1/metrics | head -5
          echo "Metrics endpoint OK"

      - name: Verify REST health
        run: |
          curl -sf http://localhost:6381/v1/health/live
          echo ""
          curl -sf http://localhost:6381/v1/health/ready
          echo ""
          echo "Health endpoints OK"

      - name: Cleanup
        if: always()
        run: |
          docker stop hebbs-smoke 2>/dev/null || true
          docker rm hebbs-smoke 2>/dev/null || true

  create-release:
    name: Create Release
    needs: [build-binaries]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > checksums.txt
          cat checksums.txt
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

  update-homebrew:
    name: Update Homebrew Tap
    needs: [create-release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download release artifacts and compute checksums
        id: checksums
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/v${VERSION}"

          curl -sSfL "${BASE_URL}/hebbs-macos-arm64.tar.gz" -o macos-arm64.tar.gz
          curl -sSfL "${BASE_URL}/hebbs-linux-x86_64.tar.gz" -o linux-x86_64.tar.gz
          curl -sSfL "${BASE_URL}/hebbs-linux-aarch64.tar.gz" -o linux-aarch64.tar.gz

          echo "sha_macos_arm64=$(sha256sum macos-arm64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "sha_linux_x86_64=$(sha256sum linux-x86_64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "sha_linux_aarch64=$(sha256sum linux-aarch64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: hebbs-ai/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/v${VERSION}"

          cat > homebrew-tap/Formula/hebbs.rb << 'FORMULA'
          class Hebbs < Formula
            desc "Cognitive memory engine — store, recall, reflect, and forget knowledge"
            homepage "https://hebbs.dev"
            version "VERSION_PLACEHOLDER"
            license "BSL-1.1"

            on_macos do
              if Hardware::CPU.arm?
                url "BASE_URL_PLACEHOLDER/hebbs-macos-arm64.tar.gz"
                sha256 "SHA_MACOS_ARM64_PLACEHOLDER"
              end
            end

            on_linux do
              if Hardware::CPU.intel?
                url "BASE_URL_PLACEHOLDER/hebbs-linux-x86_64.tar.gz"
                sha256 "SHA_LINUX_X86_64_PLACEHOLDER"
              elsif Hardware::CPU.arm?
                url "BASE_URL_PLACEHOLDER/hebbs-linux-aarch64.tar.gz"
                sha256 "SHA_LINUX_AARCH64_PLACEHOLDER"
              end
            end

            def install
              bin.install "hebbs"
              bin.install_symlink "hebbs" => "hebbs-cli"
              bin.install_symlink "hebbs" => "hebbs-vault"
              bin.install "hebbs-bench" if File.exist?("hebbs-bench")
            end

            test do
              assert_match "hebbs", shell_output("#{bin}/hebbs --version")
            end
          end
          FORMULA

          sed -i "s|VERSION_PLACEHOLDER|${VERSION}|g" homebrew-tap/Formula/hebbs.rb
          sed -i "s|BASE_URL_PLACEHOLDER|${BASE_URL}|g" homebrew-tap/Formula/hebbs.rb
          sed -i "s|SHA_MACOS_ARM64_PLACEHOLDER|${{ steps.checksums.outputs.sha_macos_arm64 }}|g" homebrew-tap/Formula/hebbs.rb
          sed -i "s|SHA_LINUX_X86_64_PLACEHOLDER|${{ steps.checksums.outputs.sha_linux_x86_64 }}|g" homebrew-tap/Formula/hebbs.rb
          sed -i "s|SHA_LINUX_AARCH64_PLACEHOLDER|${{ steps.checksums.outputs.sha_linux_aarch64 }}|g" homebrew-tap/Formula/hebbs.rb

      - name: Commit and push formula
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/hebbs.rb
          git commit -m "hebbs ${{ steps.version.outputs.version }}"
          git push
